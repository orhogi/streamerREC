services:
  streamrec:
    build: .
    container_name: streamrec
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./recordings:/recordings
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "3.0"
    environment:
      - STREAMREC_PI_MODE=1